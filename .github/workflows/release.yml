name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: Publish (${{ matrix.bundle }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: macos-apple-silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - bundle: macos-intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - bundle: linux
            platform: ubuntu-22.04
            args: ""
          - bundle: windows
            platform: windows-latest
            args: ""

    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: ${{ format('fluxtty {0}', env.TAG_NAME) }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: publish-tauri
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || !fromJSON(inputs.draft) }}

    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

    steps:
      - name: Derive version
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMG assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG_NAME" \
            --repo wangzewang/fluxtty \
            --pattern "*.dmg" \
            --dir ./dmg-assets

      - name: Compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64=$(shasum -a 256 "./dmg-assets/fluxtty_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          X86_64=$(shasum -a 256 "./dmg-assets/fluxtty_${VERSION}_x86_64.dmg" | cut -d' ' -f1)
          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64" >> "$GITHUB_OUTPUT"

      - name: Check out homebrew tap
        uses: actions/checkout@v6
        with:
          repository: wangzewang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write cask file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          X86_64_SHA="${{ steps.sha.outputs.x86_64 }}"
          mkdir -p homebrew-tap/Casks
          python3 - <<PYEOF
import os
version = os.environ['VERSION']
arm64 = os.environ['ARM64_SHA']
x86 = os.environ['X86_64_SHA']
content = f'''cask "fluxtty" do
  version "{version}"

  on_arm do
    url "https://github.com/wangzewang/fluxtty/releases/download/v#{{version}}/fluxtty_#{{version}}_aarch64.dmg"
    sha256 "{arm64}"
  end

  on_intel do
    url "https://github.com/wangzewang/fluxtty/releases/download/v#{{version}}/fluxtty_#{{version}}_x86_64.dmg"
    sha256 "{x86}"
  end

  name "fluxtty"
  desc "Multi-session developer workspace terminal"
  homepage "https://github.com/wangzewang/fluxtty"

  app "fluxtty.app"
end
'''
with open('homebrew-tap/Casks/fluxtty.rb', 'w') as f:
    f.write(content)
PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64 }}
          X86_64_SHA: ${{ steps.sha.outputs.x86_64 }}

      - name: Push cask update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/fluxtty.rb
          git commit -m "chore: update fluxtty to ${{ steps.version.outputs.version }}"
          git push
